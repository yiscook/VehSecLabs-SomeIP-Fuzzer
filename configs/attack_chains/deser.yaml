id: AC-004
name: 反序列化攻击链
description: >
  首先建立正常的服务发现流程，然后在 RPC 请求中注入畸形 TLV 结构，
  触发服务端反序列化异常（栈溢出、越界读、类型混淆）。
  CVSS 最高（9.0），因为可能导致远程代码执行。
severity: critical
cvss: 9.0

steps:
  - id: discover_service
    action: send
    template: sd_find
    params:
      service_id: "0x1234"
      instance_id: "0x0001"

  - id: wait_offer
    action: wait_for
    filter:
      message_type: SD
      sd_entry_type: OfferService
    timeout: 10

  - id: inject_malformed_tlv
    action: mutate
    params:
      service_id: "${wait_offer.service_id}"
      layer: 2
    repeat: 50
    delay_ms: 10

success_criteria:
  inject_malformed_tlv_completed: true
